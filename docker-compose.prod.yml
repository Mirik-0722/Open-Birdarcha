# Deploy: backend (Spring Boot) + frontend (nginx) — alohida xizmatlar.
# PostgreSQL — tashqi (VPS'da), DATABASE_URL orqali beriladi.
#
#   cp .env.example .env   (qiymatlarni to'ldiring)
#   docker compose -f docker-compose.prod.yml up -d --build
# Sayt: http://VPS-IP:${FRONTEND_PORT}

services:
  backend:
    build:
      context: ./backend
    container_name: open-birdarcha-backend
    image: open-birdarcha-backend:latest
    restart: unless-stopped
    environment:
      # postgres://user:pass@host:port/db  — entrypoint buni jdbc'ga o'giradi.
      # Qiymat .env dan olinadi; belgilanmasa konteyner ataylab ishga tushmaydi (sir kodda saqlanmaydi).
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL .env faylida belgilanishi shart}
      FLYWAY_BASELINE_ON_MIGRATE: ${FLYWAY_BASELINE_ON_MIGRATE:-false}
      # Telegram login
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:?TELEGRAM_BOT_TOKEN .env faylida belgilanishi shart}
      TELEGRAM_BOT_USERNAME: ${TELEGRAM_BOT_USERNAME:?TELEGRAM_BOT_USERNAME .env faylida belgilanishi shart}
      AUTH_TOKEN_SECRET: ${AUTH_TOKEN_SECRET:?AUTH_TOKEN_SECRET .env faylida belgilanishi shart}
      AUTH_TOKEN_TTL_SECONDS: ${AUTH_TOKEN_TTL_SECONDS:-86400}
      # CORS — frontend domeni; brauzer Origin'i shu bilan mos kelishi shart (aks holda 403).
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:-https://open.birdarcha.mirikdev.uz}
      # Vaqt zonasi — konteyner UTC o'rniga Asia/Tashkent (UTC+5): loglar, now(), DB o'qishlari local bo'ladi.
      TZ: ${APP_TIMEZONE:-Asia/Tashkent}
    ports:
      - "${BACKEND_PORT:-8011}:8080"
    # Port 8080 ochilganini tekshiradi (bash /dev/tcp — temurin Ubuntu image'da bash bor).
    # start_period: Spring ishga tushguncha "unhealthy" hisoblanmaydi.
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/127.0.0.1/8080' || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 40s

  frontend:
    build:
      context: ./frontend
    container_name: open-birdarcha-frontend
    image: open-birdarcha-frontend:latest
    restart: unless-stopped
    environment:
      TZ: ${APP_TIMEZONE:-Asia/Tashkent}
    ports:
      - "${FRONTEND_PORT:-8010}:80"
    depends_on:
      - backend
